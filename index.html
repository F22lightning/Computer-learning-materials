<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ส่วนประกอบคอมพิวเตอร์ (Computer Components)</title>
    <meta name="description" content="เรียนรู้ส่วนประกอบคอมพิวเตอร์แบบอินเทอร์แอคทีฟ">
    <!-- Cache control for development -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <h1><i class="fas fa-microchip"></i> เรียนรู้ส่วนประกอบคอมพิวเตอร์</h1>
            <p>คลิกที่หมายเลขอุปกรณ์หน้าชั้นเรียน เพื่อดูรายละเอียดการทำงาน</p>
        </header>

        <!-- Main Content (Home View) -->
        <main class="main-content" id="homeView">
            <!-- Buttons Area -->
            <div class="buttons-container-outer">
                <div class="buttons-header">
                    <h2>เลือกหมายเลขอุปกรณ์</h2>
                </div>
                <div class="buttons-grid" id="buttonsGrid">
                    <!-- Buttons will be injected here by JS -->
                </div>
            </div>
    </div>

    <!-- Detail Fullscreen View (Moved outside app-container for true fixed positioning) -->
    <main class="detail-fullscreen hidden" id="detailView">
        <div class="detail-container">
            <button class="back-button" id="backButton">
                <i class="fas fa-arrow-left"></i> กลับหน้าหลัก
            </button>
            
            <div class="detail-content-wrapper fade-in">
                <div class="detail-header-full">
                    <div class="title-group">
                        <span class="detail-number" id="detailNumber">1</span>
                        <div class="title-texts">
                            <h2 id="detailTitle">ชื่ออุปกรณ์</h2>
                            <h3 class="detail-subtitle" id="detailEngName">English Name</h3>
                        </div>
                    </div>
                </div>
                
                <div class="detail-body-full">
                    <div class="text-section">
                        <h4 class="section-title">ข้อมูลอุปกรณ์</h4>
                        <p class="detail-description" id="detailDesc">คำอธิบายอุปกรณ์จะแสดงที่นี่</p>
                    </div>
                    
                    <!-- Video Container -->
                    <div class="video-section">
                        <div class="video-container hidden" id="videoContainer">
                            <video id="detailVideo" controls playsinline>
                                <source src="" type="video/mp4">
                                Browser ของคุณไม่รองรับการแสดงผลวิดีโอ
                            </video>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js?v=2.0"></script>
</body>
</html>
